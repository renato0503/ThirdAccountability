<svg viewBox="0 0 192 40" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- ── Ícone: bloco escuro arredondado ── -->
  <rect width="40" height="40" rx="9" fill="#18181b"/>

  <!-- Telhado do prédio -->
  <path d="M4.5 20 L20 7.5 L35.5 20" fill="white" stroke="#18181b" stroke-width="0.4" stroke-linejoin="round"/>

  <!-- Corpo do prédio -->
  <rect x="6.5" y="18.5" width="27" height="17" rx="1.5" fill="white"/>

  <!-- Janela esquerda (vidraças sutis) -->
  <rect x="9.5" y="21.5" width="6" height="5" rx="1" fill="#18181b" opacity="0.10"/>
  <line x1="12.5" y1="21.5" x2="12.5" y2="26.5" stroke="#18181b" stroke-width="0.5" opacity="0.15"/>
  <line x1="9.5" y1="24" x2="15.5" y2="24" stroke="#18181b" stroke-width="0.5" opacity="0.15"/>

  <!-- Janela direita -->
  <rect x="24.5" y="21.5" width="6" height="5" rx="1" fill="#18181b" opacity="0.10"/>
  <line x1="27.5" y1="21.5" x2="27.5" y2="26.5" stroke="#18181b" stroke-width="0.5" opacity="0.15"/>
  <line x1="24.5" y1="24" x2="30.5" y2="24" stroke="#18181b" stroke-width="0.5" opacity="0.15"/>

  <!-- Porta -->
  <rect x="17" y="27.5" width="6" height="8" rx="1" fill="#18181b" opacity="0.10"/>

  <!-- Check verde (aprovação / conformidade) -->
  <path d="M13 31 L16.5 34.2 L23.5 25.5"
        stroke="#22c55e" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── Wordmark ── -->

  <!-- "gestão" — peso bold, cor quase preta -->
  <text x="51" y="20"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-weight="700"
        font-size="15"
        fill="#09090b"
        letter-spacing="-0.2">gestão</text>

  <!-- "terceiro" — peso semibold, cinza médio, espaçado -->
  <text x="51" y="34"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-weight="600"
        font-size="11"
        fill="#71717a"
        letter-spacing="1.4">terceiro</text>

  <!-- Linha divisória vertical sutil entre ícone e texto -->
  <line x1="46" y1="8" x2="46" y2="32" stroke="#e4e4e7" stroke-width="1"/>

</svg>

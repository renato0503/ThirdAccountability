steps:
  # Build API
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/gestao-api:${SHORT_SHA}'
      - './apps/api'
    id: 'build-api'

  # Push API image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/gestao-api:${SHORT_SHA}'
    id: 'push-api'

  # Deploy API to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'gestao-api'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/gestao-api:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--timeout=300'
      - '--set-env-vars=NODE_ENV=production,FIREBASE_PROJECT_ID=${PROJECT_ID},FRONTEND_URL=https://gestaosetor3.web.app'
      - '--update-secrets=GROQ_API_KEY=groq-api-key:latest'
    id: 'deploy-api'

  # Build frontend
  - name: 'node:22'
    entrypoint: bash
    args:
      - '-c'
      - |
        cd apps/web
        npm install -g pnpm
        pnpm install --frozen-lockfile
        pnpm run build
    id: 'build-frontend'

  # Deploy frontend to Firebase Hosting
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        curl -sL https://firebase.tools | bash
        firebase deploy --only hosting --project ${PROJECT_ID}
    id: 'deploy-frontend'

substitutions:
  _REGION: southamerica-east1

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
